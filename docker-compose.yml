services:
  postgres:
    image: postgres:18.4-alpine3.24
    container_name: psgr
    environment:
      - POSTGRES_DB=mydata
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - dbnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mydata" ]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    links:
      - "postgres:db" # алиас db → postgres
    depends_on:
      - postgres
    networks:
      - dbnet

  back-node:
    build: ./BackendNode # путь к Dockerfile
    image: back-node # имя собранного образа
    container_name: back-node
    environment:
      - PGHOST=postgres
      - PGUSER=postgres
      - PGPASSWORD=1234
      - PGDATABASE=mydata
    ports:
      - "4000:4000" # опционально: прямой доступ к API с хоста
    networks:
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:4000/api/women', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./React/frontend
    image: frontend
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - dbnet
    depends_on:
      back-node:
        condition: service_healthy

networks:
  dbnet:
    driver: bridge

volumes:
  postgres-data:
